name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/android-apk.yml'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'css/**'
      - 'index.html'
      - 'js/**'
      - 'package-lock.json'
      - 'package.json'
      - 'scripts/**'
      - 'worker/**'

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Write Google Services Config
        if: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON != '' }}
        run: echo '${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Sync Capacitor Android assets
        run: npm run cap:sync

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: unino-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error