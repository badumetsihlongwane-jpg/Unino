name: Deploy Firebase Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.firebaserc'

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

    steps:
      - name: Skip when Firebase token is missing
        if: ${{ env.FIREBASE_TOKEN == '' }}
        run: echo "FIREBASE_TOKEN is not configured; skipping Firebase Functions deploy."

      - name: Checkout
        if: ${{ env.FIREBASE_TOKEN != '' }}
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ env.FIREBASE_TOKEN != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            functions/package-lock.json

      - name: Install Firebase CLI
        if: ${{ env.FIREBASE_TOKEN != '' }}
        run: npm install -g firebase-tools

      - name: Install Functions Dependencies
        if: ${{ env.FIREBASE_TOKEN != '' }}
        working-directory: functions
        run: npm install

      - name: Deploy Functions
        if: ${{ env.FIREBASE_TOKEN != '' }}
        run: firebase deploy --only functions --project unino-b215f --token "$FIREBASE_TOKEN"