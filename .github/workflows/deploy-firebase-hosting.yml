name: Deploy Firebase Hosting

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-firebase-hosting.yml'
      - 'css/**'
      - 'index.html'
      - 'js/**'
      - 'scripts/**'
      - 'worker/**'
      - 'firebase.json'
      - '.firebaserc'

jobs:
  deploy-hosting:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

    steps:
      - name: Skip when Firebase token is missing
        if: ${{ env.FIREBASE_TOKEN == '' }}
        run: echo "FIREBASE_TOKEN is not configured; skipping Firebase Hosting deploy."

      - name: Checkout
        if: ${{ env.FIREBASE_TOKEN != '' }}
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ env.FIREBASE_TOKEN != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: ${{ env.FIREBASE_TOKEN != '' }}
        run: npm ci

      - name: Build web assets
        if: ${{ env.FIREBASE_TOKEN != '' }}
        run: npm run build:web

      - name: Install Firebase CLI
        if: ${{ env.FIREBASE_TOKEN != '' }}
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        if: ${{ env.FIREBASE_TOKEN != '' }}
        run: firebase deploy --only hosting --project unino-b215f --token "$FIREBASE_TOKEN"
