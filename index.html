<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Unibo — NWU Campus, Connected</title>
  <meta name="description" content="NWU campus social app: feed, stories, study groups, marketplace, messaging & more.">
  <meta name="theme-color" content="#FFFFFF">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="css/styles.css?v=28">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
</head>
<body>

<!-- ══ SPLASH ══ -->
<div id="splash" class="screen active">
  <div class="splash-inner">
    <div class="splash-logo">🎓</div>
    <h1 class="splash-title">Unibo</h1>
    <div class="spinner"></div>
  </div>
</div>

<!-- ══ AUTH ══ -->
<div id="auth-screen" class="screen">
  <div class="auth-wrap">
    <div class="auth-hero">
      <div class="auth-emoji">🎓</div>
      <h1>Unibo</h1>
      <p>NWU Campus, Connected</p>
    </div>
    <form id="login-form" class="auth-form active" autocomplete="off">
      <input type="email" id="l-email" placeholder="University email" required>
      <div class="password-field"><input type="password" id="l-pass" placeholder="Password" required><button type="button" class="password-toggle" data-target="l-pass">Show</button></div>
      <div class="auth-links-row">
        <button type="button" class="text-link-btn" id="forgot-pass-btn">Forgot password?</button>
      </div>
      <button type="submit" class="btn-accent w100" id="l-btn">Log In</button>
      <p class="switch-text">No account? <a href="#" id="to-signup">Sign Up</a></p>
    </form>
    <form id="signup-form" class="auth-form" autocomplete="off">
      <div class="row2">
        <input type="text" id="s-fname" placeholder="First name" required>
        <input type="text" id="s-lname" placeholder="Last name" required>
      </div>
      <input type="email" id="s-email" placeholder="University email" required>
      <div class="password-field"><input type="password" id="s-pass" placeholder="Password (6+ chars)" required><button type="button" class="password-toggle" data-target="s-pass">Show</button></div>
      <select id="s-uni" required>
        <option value="">Select university…</option>
        <option selected>NWU</option>
      </select>
      <input type="text" id="s-major" placeholder="Your course/major (e.g. Bachelor of Computer Science)" required>
      <input type="text" id="s-modules" placeholder="Your modules (e.g. MAT101, COS132, PHY121)">
      <select id="s-year"><option value="">Year of study…</option>
        <option>1st Year</option><option>2nd Year</option><option>3rd Year</option>
        <option>Honours</option><option>Postgrad</option><option>PhD</option>
      </select>
      <input type="text" id="s-address" placeholder="Campus / res / area (e.g. Potch Main Campus)" autocomplete="off" style="margin-bottom:0">
      <div id="s-address-suggestions" style="display:none;background:var(--bg-secondary);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;max-height:150px;overflow-y:auto;margin-bottom:12px"></div>
      <button type="submit" class="btn-accent w100" id="s-btn">Create Account</button>
      <p class="switch-text">Already registered? <a href="#" id="to-login">Log In</a></p>
    </form>
  </div>
</div>

<!-- ══ APP SHELL ══ -->
<div id="app" class="screen">
  <!-- Header -->
  <header id="hdr">
    <div class="hdr-l">
      <span class="hdr-logo">🎓 <b>Unibo</b></span>
      <button class="status-pill" id="status-pill">
        <span class="dot green" id="status-dot"></span>
        <span id="status-text">Online</span>
      </button>
    </div>
    <div class="hdr-r">
      <span class="live-count" id="live-count"><span class="dot green sm"></span><span id="hdr-count">0</span></span>
      <button class="icon-btn" id="theme-btn" aria-label="Theme">
        <svg class="ic-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="ic-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="icon-btn" id="notif-btn" aria-label="Notifications">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="badge-dot" id="notif-dot" style="display:none"></span>
      </button>
      <div class="hdr-avatar" id="hdr-avatar"></div>
    </div>
  </header>

  <!-- Content -->
  <main id="content"></main>

  <!-- Bottom Nav -->
  <nav id="nav">
    <button class="nav-btn active" data-p="feed">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Feed</span>
    </button>
    <button class="nav-btn" data-p="explore">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Explore</span>
    </button>
    <button class="nav-btn nav-plus" data-p="create">
      <div class="plus-circle"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
    </button>
    <button class="nav-btn" data-p="hustle">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span>Hustle</span>
    </button>
    <button class="nav-btn" data-p="chat">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Chat</span>
      <span class="nav-badge" id="chat-badge"></span>
    </button>
  </nav>
</div>

<!-- ══ CHAT VIEW ══ -->
<div id="chat-view" class="screen">
  <header class="sub-hdr">
    <button class="icon-btn" id="chat-back"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="sub-hdr-info" id="chat-hdr-info"></div>
    <button class="icon-btn anon-toggle-btn" id="chat-anon-toggle" title="Toggle Anonymous Mode">
      <svg class="anon-icon-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <svg class="anon-icon-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M12 2C6.48 2 2 6 2 11c0 2.8 1.3 5.3 3.4 7L12 22l6.6-4C20.7 16.3 22 13.8 22 11c0-5-4.48-9-10-9z"/><circle cx="9" cy="11" r="1.5" fill="currentColor"/><circle cx="15" cy="11" r="1.5" fill="currentColor"/></svg>
    </button>
  </header>
  <div id="anon-reveal-banner" class="anon-reveal-banner" style="display:none"></div>
  <div id="chat-msgs" class="chat-msgs"></div>
  <div id="chat-img-preview" class="chat-img-preview" style="display:none">
    <img src="" alt="">
    <button class="image-preview-remove" onclick="document.getElementById('chat-img-preview').style.display='none'">&times;</button>
  </div>
  <div id="voice-recorder" class="voice-recorder" style="display:none">
    <div class="voice-rec-indicator">
      <span class="rec-dot"></span>
      <span id="voice-timer">0:00</span>
    </div>
    <button class="voice-cancel-btn" onclick="cancelVoiceRecord()">Cancel</button>
    <button class="voice-send-btn" onclick="stopVoiceAndSend()">Send</button>
  </div>
  <div id="dm-reply-indicator" class="chat-reply-indicator" style="display:none"></div>
  <div class="chat-bar">
    <label class="add-photo-btn chat-attach-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <input type="file" hidden accept="image/*,video/*" id="chat-file-input">
    </label>
    <textarea id="chat-input" placeholder="Message…" autocomplete="off" style="resize:none;overflow-y:auto;max-height:84px;min-height:40px;font-family:inherit;font-size:16px;line-height:1.3"></textarea>
    <button class="voice-btn" id="chat-voice-btn" onclick="startVoiceRecord()" title="Voice message"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="1" width="6" height="11" rx="3" ry="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
    <button class="send-btn" id="chat-send"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
  </div>
</div>

<!-- ══ GROUP CHAT VIEW ══ -->
<div id="group-chat-view" class="screen">
  <header class="sub-hdr">
    <button class="icon-btn" id="gchat-back"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="sub-hdr-info" id="gchat-hdr-info"></div>
  </header>
  <div id="gchat-msgs" class="chat-msgs"></div>
  <div id="gchat-voice-recorder" class="voice-recorder" style="display:none">
    <div class="voice-rec-indicator">
      <span class="rec-dot"></span>
      <span id="gchat-voice-timer">0:00</span>
    </div>
    <button class="voice-cancel-btn" onclick="cancelVoiceRecord('gchat')">Cancel</button>
    <button class="voice-send-btn" onclick="stopVoiceAndSend('gchat')">Send</button>
  </div>
  <div id="gchat-reply-indicator" class="chat-reply-indicator" style="display:none"></div>
  <div class="chat-bar">
    <textarea id="gchat-input" placeholder="Message group…" autocomplete="off" style="resize:none;overflow-y:auto;max-height:84px;min-height:40px;font-family:inherit;font-size:16px;line-height:1.3"></textarea>
    <button class="voice-btn" id="gchat-voice-btn" onclick="startVoiceRecord('gchat')" title="Voice message"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="1" width="6" height="11" rx="3" ry="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
    <button class="send-btn" id="gchat-send"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
  </div>
</div>

<!-- ══ PROFILE VIEW ══ -->
<div id="profile-view" class="screen">
  <header class="sub-hdr">
    <button class="icon-btn" id="prof-back"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
    <h3 id="prof-top-name"></h3>
    <div style="width:40px"></div>
  </header>
  <div id="prof-body"></div>
</div>

<!-- ══ SETTINGS VIEW ══ -->
<div id="settings-view" class="screen">
  <header class="sub-hdr">
    <button class="icon-btn" id="settings-back"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
    <h3>Settings</h3>
    <div style="width:40px"></div>
  </header>
  <div id="settings-body"></div>
</div>

<!-- ══ STORY VIEWER ══ -->
<div id="story-viewer" class="story-viewer-overlay" style="display:none">
  <div class="story-progress-bar" id="story-progress-bar"></div>
  <div class="story-viewer-header">
    <div class="story-viewer-user" id="story-viewer-user"></div>
    <button class="story-close-btn" id="story-close">&times;</button>
  </div>
  <div class="story-viewer-content" id="story-viewer-content"></div>
  <div class="story-viewer-nav">
    <div class="story-nav-prev" id="story-prev"></div>
    <div class="story-nav-next" id="story-next"></div>
  </div>
  <div class="story-reply-bar" id="story-reply-bar" style="display:none">
    <input type="text" id="story-reply-input" placeholder="Reply to story..." maxlength="500" autocomplete="off">
    <button class="story-reply-send" id="story-reply-send">Send</button>
  </div>
</div>

<!-- ══ NOTIFICATION DROPDOWN ══ -->
<div id="notif-dropdown" class="notif-dropdown" style="display:none"></div>

<!-- ══ MODAL ══ -->
<div id="modal-bg" class="modal-bg" style="display:none">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-bar"></div>
    <div id="modal-inner"></div>
  </div>
</div>

<!-- ══ IMAGE VIEWER ══ -->
<div id="img-view" class="img-view" style="display:none">
  <button class="img-close" id="img-close">&times;</button>
  <div class="img-gallery-counter" id="img-counter" style="display:none"></div>
  <div class="img-gallery-prev" id="img-prev" style="display:none">‹</div>
  <div class="img-gallery-next" id="img-next" style="display:none">›</div>
  <img id="img-full" src="" alt="">
</div>

<!-- ══ TOAST ══ -->
<div id="toast" class="toast"></div>

<!-- ══ SCRIPTS ══ -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js?v=28"></script>
</body>
</html>
